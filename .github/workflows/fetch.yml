name: fetch

on:
  schedule:
    # Multiple times daily during season (March-October)
    # Actual scripts run are determined by detected phase
    - cron: '0 8,12,15,23 * 3-10 *'
  workflow_dispatch:
    inputs:
      phase_override:
        description: 'Override season phase (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - ''
          - 'regular_season'
          - 'postseason'
          - 'offseason'

jobs:
  update_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{github.workspace}}  # This sets the working directory for all run commands
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Set up AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-1

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytz geopandas tqdm pyarrow fastparquet lxml beautifulsoup4 altair_saver altair-stiles vl-convert-python
    
    - name: Create necessary directories
      run: |
        mkdir -p data/pitching
        mkdir -p data/batting
        mkdir -p data/pitches
        mkdir -p data/postseason

    - name: Install Fonts
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-roboto

    - name: Set up Ruby for Jekyll
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0' # Match the version to your Gemfile or latest stable release

    - name: Install Bundler and Jekyll dependencies
      run: |
        gem install bundler
        bundle install

    - name: Run phase-aware data pipeline
      run: |
        if [ -n "${{ github.event.inputs.phase_override }}" ]; then
          echo "Using manual phase override: ${{ github.event.inputs.phase_override }}"
          python scripts/run_phase_scripts.py ${{ github.event.inputs.phase_override }}
        else
          echo "Auto-detecting phase from MLB schedule"
          python scripts/run_phase_scripts.py
        fi

    - name: Publish manifest
      run: python scripts/99_publish_manifest.py

    - name: Build Jekyll site
      run: bundle exec jekyll build
      env:
        TZ: America/Los_Angeles

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site  # The output folder of Jekyll build
        publish_branch: gh-pages  

    - name: Check for changes
      id: changes
      run: |
        git add .
        git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT
  
    - name: Commit updated files
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --global user.name 'Matt Stiles'
        git config --global user.email 'haekeostiles@gmail.com'
        git commit -m "Automated update of Dodgers data, visuals"
  
    - name: Push changes
      if: steps.changes.outputs.changes == 'true'
      run: git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
