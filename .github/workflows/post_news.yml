name: Post News Roundup

on:
  schedule:
    # Runs every 3 hours during daytime hours PT (converted to UTC)
    - cron: '0 15,18,21,0 * * *'  # 8 AM, 11 AM, 2 PM, 5 PM PT
  workflow_dispatch:
    inputs:
      force:
        description: 'Force posting regardless of time constraints'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  post_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news fetch and tweet
        env:
          DODGERS_TWITTER_API_KEY: ${{ secrets.DODGERS_TWITTER_API_KEY }}
          DODGERS_TWITTER_API_SECRET: ${{ secrets.DODGERS_TWITTER_API_SECRET }}
          DODGERS_TWITTER_TOKEN: ${{ secrets.DODGERS_TWITTER_TOKEN }}
          DODGERS_TWITTER_TOKEN_SECRET: ${{ secrets.DODGERS_TWITTER_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/24_fetch_news.py --post-tweet --save-json --force
          else
            python scripts/24_fetch_news.py --post-tweet --save-json
          fi

      - name: Commit and push news data
        run: |
          if [ ! -f _data/latest_news.json ]; then
            echo "No news JSON file produced this run; skipping commit."
            exit 0
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/latest_news.json
          if git diff --staged --quiet; then
            echo "News data unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "Update latest news data"
          git push 